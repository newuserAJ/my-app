version: '3.8'

# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: my-app-backend-dev
    ports:
      - "8080:8080"
      - "9229:9229"  # Node.js debug port
    environment:
      - NODE_ENV=development
      - DEBUG_MODE=true
      - ENABLE_HOT_RELOAD=true
    env_file:
      - ./backend/.env
    volumes:
      # Mount source code for hot reloading
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/package-lock.json:/app/package-lock.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/.eslintrc.js:/app/.eslintrc.js:ro
      - ./backend/.prettierrc:/app/.prettierrc:ro
      # Logs volume
      - backend-logs-dev:/app/logs
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Development database (PostgreSQL) - if not using Supabase
  postgres:
    image: postgres:15-alpine
    container_name: my-app-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-myapp_dev}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: my-app-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis-dev-password}
    volumes:
      - redis-data-dev:/data
    networks:
      - app-network

  # Nginx for development (optional)
  nginx:
    image: nginx:alpine
    container_name: my-app-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - backend

  # Testing service
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: testing
    container_name: my-app-backend-test
    environment:
      - NODE_ENV=test
    env_file:
      - ./backend/.env.test
    volumes:
      - ./backend:/app
      - /app/node_modules
      - test-results:/app/coverage
    networks:
      - app-network
    profiles:
      - testing

  # Mail development server (MailHog)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: my-app-mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - app-network
    profiles:
      - mail

volumes:
  backend-logs-dev:
    name: my-app-backend-logs-dev
  postgres-data-dev:
    name: my-app-postgres-data-dev
  redis-data-dev:
    name: my-app-redis-data-dev
  test-results:
    name: my-app-test-results